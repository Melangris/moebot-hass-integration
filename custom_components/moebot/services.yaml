set_back_mowing:
  description: "Configura la parada o giro de cuchilla cuando el robot maniobra hacia atrás (DP 121)"
  fields:
    enabled:
      description: "True para detener la cuchilla al retroceder, False para que siga girando"
      example: true
      selector:
        boolean:

set_rain_delay:
  description: "Configura el tiempo de espera tras detectar lluvia (DP 139)"
  fields:
    minutes:
      name: "Minutos"
      description: "Minutos de espera tras secarse el sensor de lluvia"
      example: 60
      default: 60
      selector:
        number:
          min: 0
          max: 720
          unit_of_measurement: "min"
          mode: box

set_hedgehog_protection:
  description: "Activa o desactiva el modo de protección de animales pequeños (DP 118)"
  fields:
    enabled:
      description: "True para activar protección, False para desactivar"
      example: true
      selector:
        boolean:
